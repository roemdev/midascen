services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: midascen_app
    env_file:
      - .env.docker
    networks:
      - midascen_net
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: midascen_nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./public:/var/www/public
    depends_on:
      - app
    networks:
      - midascen_net
    restart: unless-stopped

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: midascen_queue
    command: php artisan queue:work --sleep=3 --tries=3
    env_file:
      - .env.docker
    networks:
      - midascen_net
    restart: unless-stopped

networks:
  midascen_net:
    driver: bridge